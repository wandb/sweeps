version: 2.1

orbs:
  codecov: codecov/codecov@5.0.3

commands:
  install-uv:
    steps:
      - run:
          name: Install uv
          command: |
            curl -LsSf https://astral.sh/uv/0.11.9/install.sh | sh
            echo 'export PATH="$HOME/.local/bin:$PATH"' >> "$BASH_ENV"
  install-python:
    parameters:
      python_version:
        type: string
    steps:
      - run:
          name: Install Python << parameters.python_version >>
          command: uv python install << parameters.python_version >>
  uv-run-dev:
    parameters:
      step_name:
        type: string
        default: Run command
      python_version:
        type: string
      command:
        type: string
    steps:
      - run:
          name: << parameters.step_name >>
          command: uv run --python << parameters.python_version >> --with-requirements requirements.dev.txt << parameters.command >>
          no_output_timeout: 60m

jobs:
  linux310:
    machine:
      image: ubuntu-2404:2025.09.1
    resource_class: large
    steps:
      - checkout
      - install-uv
      - install-python:
          python_version: "3.10"
      - uv-run-dev:
          step_name: Run tests
          python_version: "3.10"
          command: tox -e py310
      # Upload coverage from one Python version to avoid duplicate Codecov reports.
      # Move coverage to another version when we deprecate this one.
      - codecov/upload:
          flags: unit
      - store_artifacts:
          path: coverage.xml
          destination: coverage/coverage.xml
      - store_artifacts:
          path: prof/
      - store_test_results:
          path: result.xml
  linux311:
    machine:
      image: ubuntu-2404:2025.09.1
    resource_class: large
    steps:
      - checkout
      - install-uv
      - install-python:
          python_version: "3.11"
      - uv-run-dev:
          step_name: Run tests
          python_version: "3.11"
          command: tox -e py311
      - store_artifacts:
          path: prof/
      - store_test_results:
          path: result.xml
  linux312:
    machine:
      image: ubuntu-2404:2025.09.1
    resource_class: large
    steps:
      - checkout
      - install-uv
      - install-python:
          python_version: "3.12"
      - uv-run-dev:
          step_name: Run tests
          python_version: "3.12"
          command: --with setuptools==75.8.0 tox -e py312
      - store_artifacts:
          path: prof/
      - store_test_results:
          path: result.xml
  linters310:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - install-uv
      - uv-run-dev:
          step_name: Run linters
          python_version: "3.10"
          command: pre-commit run --all-files
  linters311:
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - install-uv
      - uv-run-dev:
          step_name: Run linters
          python_version: "3.11"
          command: pre-commit run --all-files
  linters312:
    docker:
      - image: cimg/python:3.12
    steps:
      - checkout
      - install-uv
      - uv-run-dev:
          step_name: Run linters
          python_version: "3.12"
          command: pre-commit run --all-files

workflows:
  main:
    jobs:
      - linux310
      - linux311
      - linux312
      - linters310
      - linters311
      - linters312
