# DTLZ2 6D Multi-Objective Optimization Sweep Config
# 2 objectives (f1, f2), unconstrained

method: ax
name: DTLZ2_6D

metrics:
  - name: f1
    goal: minimize
    threshold: 1.1
  - name: f2
    goal: minimize
    threshold: 1.1

parameters:
  x0:
    min: 0.0
    max: 1.0
  x1:
    min: 0.0
    max: 1.0
  x2:
    min: 0.0
    max: 1.0
  x3:
    min: 0.0
    max: 1.0
  x4:
    min: 0.0
    max: 1.0
  x5:
    min: 0.0
    max: 1.0
